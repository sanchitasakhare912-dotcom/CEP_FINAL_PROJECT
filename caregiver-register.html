<!DOCTYPE html>
<html>
<head>
  <title>Caregiver Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #cfe9f5, #fef6e4);
      color: #2E3A3A;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }

    .login-card {
      background: #FFFFFF;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin: 0;
      color: #2F6F73;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #5F8F94;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
      color: #2E3A3A;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #CCC;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #6FCF97;
    }

    .forgot-password {
      text-align: right;
      margin-top: 6px;
    }

    .forgot-password a {
      font-size: 13px;
      color: #2F6F73;
      text-decoration: none;
      cursor: pointer;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      background: #6FCF97;
      color: #FFFFFF;
      padding: 12px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      margin-top: 18px;
      cursor: pointer;
    }

    .create-btn {
      width: 100%;
      background: #F1F1F1;
      color: #2E3A3A;
      padding: 12px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      margin-top: 10px;
      cursor: pointer;
    }

    .login-btn:hover {
      background: #58B985;
    }

    .create-btn:hover {
      background: #E1E1E1;
    }

    #message {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
    <div class="login-card">

      <h1>Caregiver Login</h1>
      <p class="subtitle">Manage and monitor patient care</p>

      <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>

        <!-- Forgot Password -->
        <div class="forgot-password">
          <a onclick="forgotPassword()">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>
        <button type="button" class="create-btn" onclick="createAccount()">
          Create Account
        </button>
      </form>

      <p id="message"></p>

    </div>
  </div>


<script src="login.js"></script>

</body>
</html>
