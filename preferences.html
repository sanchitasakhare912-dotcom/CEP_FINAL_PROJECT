<!DOCTYPE html>
<html>
<head>
<title>Language & Preferences</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(180deg, #cfe9f5, #fef6e4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:320px;
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h2{
text-align:center;
margin-bottom:20px;
color:#555;
}

label{
font-size:14px;
color:#555;
}

select{
width:100%;
padding:10px;
margin:6px 0 14px 0;
border-radius:20px;
border:2px solid #f4b942;
outline:none;
background:#f7fbff;
}

.save-btn{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#9ed7d7,#8ccfcf);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

.back-btn{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#e6e6e6;
color:#333;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.saved-msg{
margin-top:15px;
font-size:14px;
color:#555;
text-align:center;
}

.saved-box{
margin-top:10px;
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<h2>Language & Preferences</h2>

<label>Select Language</label>

<select id="language">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="mr">Marathi</option>
</select>

<label>Text Size</label>

<select id="textSize">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>

<button class="save-btn" onclick="savePreferences()">Save</button>

<button class="back-btn" onclick="goBack()">Back</button>

<div class="saved-msg" id="message"></div>

<hr>

<h3>Saved Preferences</h3>

<div class="saved-box" id="savedPreferences">
No preferences saved.
</div>

</div>

<script>

function savePreferences(){

const language=document.getElementById("language").value;
const textSize=document.getElementById("textSize").value;

const prefs={
language,
textSize
};

localStorage.setItem("preferences",JSON.stringify(prefs));

document.getElementById("message").innerText="Preferences saved successfully";

displayPreferences();

}

function displayPreferences(){

const saved=localStorage.getItem("preferences");

if(!saved){
document.getElementById("savedPreferences").innerHTML="No preferences saved.";
return;
}

const prefs=JSON.parse(saved);

document.getElementById("savedPreferences").innerHTML=`
<b>Language:</b> ${prefs.language}<br>
<b>Text Size:</b> ${prefs.textSize}
`;

}

function goBack(){
window.location.href="caregiver-dashboard.html";
}

window.onload=function(){

const saved=localStorage.getItem("preferences");

if(saved){

const prefs=JSON.parse(saved);

document.getElementById("language").value=prefs.language;
document.getElementById("textSize").value=prefs.textSize;

}

displayPreferences();

}

</script>

</body>
</html>
