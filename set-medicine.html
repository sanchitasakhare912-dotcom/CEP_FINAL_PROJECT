<!DOCTYPE html>
<html>
<head>
  <title>Set Medicines</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(180deg, #cfe9f5, #fef6e4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 380px;
    }

    .card {
      background: #f8f8f8;
      padding: 25px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 800;
      color: #333;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #6FCF97;
    }

    .add-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 20px;
      background: #6FCF97;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
      transition: 0.2s;
    }

    .add-btn:hover {
      opacity: 0.9;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f2a48f;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #333;
    }

    .medicine-info {
      display: flex;
      flex-direction: column;
    }

    .delete-btn {
      background: #e74c3c;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .delete-btn:hover {
      opacity: 0.9;
    }

    .back-btn {
      width: 100%;
      padding: 12px;
      border-radius: 20px;
      border: none;
      background: #6FCF97;
      color: white;
      font-weight: bold;
      margin-top: 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>Set Medicine Timings</h1>

    <div class="input-group">
      <input type="text" id="medName" placeholder="Medicine Name">
      <input type="time" id="medTime">
    </div>

    <button class="add-btn" onclick="addMedicine()">Add Medicine</button>

    <ul id="medicineList"></ul>

    <button class="back-btn" onclick="goBack()">Back</button>

  </div>
</div>

<script src="set-medicine.js"></script>
<script src="caregiver.js"></script>

</body>
</html>
