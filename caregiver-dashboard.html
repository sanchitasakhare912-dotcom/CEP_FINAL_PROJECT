<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caregiver Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: linear-gradient(180deg, #cfe9f5, #fef6e4); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .dashboard { background: #fff; border-radius: 1.5rem; padding: 1.5rem; max-width: 420px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .top-bar { display: flex;justify-content: space-between;margin-bottom: 1.5rem;}
    .logout-btn { background: hsl(210,20%,94%); border: none; border-radius: 9999px; padding: 0.375rem 1rem; font-size: 0.75rem; font-weight: 700; color: hsl(220,10%,50%); cursor: pointer; }
    .logout-btn:hover { background: hsl(200,20%,88%); }
    .settings-btn { background: hsl(210,20%,94%); border: none; border-radius: 9999px; width: 2rem; height: 2rem; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .settings-btn:hover { background: hsl(200,20%,88%); }
    .title { text-align: center; font-size: 1.5rem; font-weight: 800; color: hsl(220,20%,20%); margin-bottom: 2rem; }
    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
    .card { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.75rem; border-radius: 1rem; padding: 1.5rem; min-height: 120px; border: none; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .card:active { transform: scale(0.95); }
    .card .icon { font-size: 2rem; }
    .card p { font-size: 0.875rem; font-weight: 700; text-align: center; line-height: 1.3; }
    .mint { background: hsl(169, 100%, 86%); color: hsl(168, 40%, 40%); }
    .peach { background: hsl(25, 76%, 85%); color: hsl(25, 39%, 52%); }
    .lavender { background: hsl(264, 88%, 90%); color: hsl(260, 32%, 57%); }
    .green { background: hsl(145, 77%, 85%); color: hsl(145, 32%, 40%); }
    .blue { background: hsl(207, 67%, 81%); color: hsl(211, 36%, 45%); }
    .peach2 { background: hsl(347, 97%, 86%); color: hsl(353, 30%, 48%); }
    .actions { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    .save-btn { background: hsl(168,40%,55%); color: #fff; border: none; border-radius: 9999px; padding: 0.625rem 2rem; font-size: 0.875rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .save-btn:hover { opacity: 0.9; }
    .save-btn:active { transform: scale(0.95); }
    .bottom-logout { font-size: 0.75rem; font-weight: 700; color: hsl(168,40%,55%); opacity: 0.7; cursor: pointer; display: flex; align-items: center; gap: 0.375rem; }
    .bottom-logout:hover { opacity: 1; }

    /* ===== NEW SECTIONS ADDED (NO CHANGE TO YOUR CODE ABOVE) ===== */

    .extra-section{
      margin-top:30px;
      padding:15px;
      border-top:1px solid #eee;
    }

    .extra-section h2{
      font-size:18px;
      margin-bottom:10px;
    }

    .extra-section input,
    .extra-section select{
      width:100%;
      padding:6px;
      margin:5px 0;
      border-radius:6px;
      border:1px solid #ccc;
    }

    .extra-section button{
      margin-top:8px;
      padding:6px 14px;
      border:none;
      border-radius:6px;
      background:#5dbb95;
      color:white;
      cursor:pointer;
    }

  </style>
</head>

<body>
  <div class="dashboard">
    <div class="top-bar">
      <button class="logout-btn" onclick="goToPatient()">Patient View</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <h1 class="title">Caregiver Dashboard</h1>

    <div class="card-grid">
      <div class="card mint"><div class="icon" onclick="goRoutine()">🕒</div><p>Edit Daily Routine</p></div>
      <div class="card peach"><div class="icon" onclick="goMedicine()">💊</div><p>Set Medicine Timings</p></div>
      <div class="card lavender"><div class="icon" onclick="goManageReminders()">🔔</div><p>Manage Reminders</p></div>
      <div class="card green" onclick="goCaregiverPeople()">
         <div class="icon">👥</div>
         <p>Manage "My People"</p>
      </div>
      <div class="card blue" onclick="openPreferences()">
  <div class="icon">🌐</div>
  <p>Language & Preferences</p>
</div>

<div class="card peach2" onclick="openPatientOverview()">
  <div class="icon">👤</div>
  <p>View Patient Overview</p>
</div>
    </div>

    <div class="actions">
      <button class="save-btn">Save Changes</button>
    </div>

    <!-- ================= NEW PART ADDED ================= -->

  </div>

  <script>
    function goToPatient() {
      localStorage.removeItem("isNewUser");
      window.location.href = "index.html";
    }

    function logout() {
      localStorage.removeItem("sessionActive");
      localStorage.removeItem("currentUser");
      localStorage.removeItem("isNewUser");
      window.location.href = "caregiver-register.html";
    }
  </script>

  <script src="caregiver.js"></script>
</body>

</html>
